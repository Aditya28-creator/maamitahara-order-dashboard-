<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Order Source Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --border: #262b36;
    --text: #e8eaed;
    --muted: #9aa2af;
    --accent: #5b8def;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
  select, input[type=text], input[type=date], input[type=number] {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; font-size: 14px;
  }
  input[type=date] { color-scheme: dark; }
  input[type=number] { width: 100px; }
  button {
    background: var(--accent); color: white; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 14px; cursor: pointer;
  }
  button.secondary {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .custom-range { display: none; align-items: center; gap: 8px; }
  .custom-range.active { display: flex; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px;
  }
  .card.full { grid-column: 1 / -1; }
  .card h2 { font-size: 15px; margin: 0 0 16px 0; color: var(--muted); font-weight: 600; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  .stat { font-size: 28px; font-weight: 700; }
  .error { color: #f87171; padding: 16px; background: #2a1515; border-radius: 8px; }
  .success { color: #10b981; padding: 10px 16px; background: #132a1f; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
  .loading { color: var(--muted); padding: 20px; }
  .day-row { cursor: pointer; }
  .day-row:hover { background: #1d212b; }
  .day-detail { display: none; }
  .day-detail.open { display: table-row; }
  .day-detail td { padding: 0; }
  .day-detail-inner { padding: 10px 6px 16px 20px; }
  .chip {
    display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 999px;
    background: #1d212b; border: 1px solid var(--border); margin: 2px 6px 2px 0; color: var(--muted);
  }
  .badge-paid { color: #f59e0b; }
  .badge-organic { color: #10b981; }
  .scroll-table { max-height: 420px; overflow-y: auto; }
  .missing { color: #6b7280; font-style: italic; }
  .session-form { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .session-form label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
  .device-bar { display: flex; height: 6px; border-radius: 4px; overflow: hidden; width: 100px; background: #262b36; }
  .device-bar .desktop { background: var(--accent); }
  .device-bar .mobile { background: #f59e0b; }
  .source-badge {
    display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 999px;
    margin-left: 6px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase;
  }
  .source-clarity { background: #132a1f; color: #10b981; }
  .source-manual { background: #262b36; color: var(--muted); }
  .clarity-sync-row { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
</style>
</head>
<body>

<h1>Order Source Dashboard</h1>
<div class="sub" id="shopLabel">Loading...</div>

<div class="controls">
  <label style="color:var(--muted); font-size:14px;">Window:</label>
  <select id="daysSelect" onchange="handleWindowChange()">
    <option value="7">Last 7 days</option>
    <option value="30">Last 30 days</option>
    <option value="60" selected>Last 60 days</option>
    <option value="90">Last 90 days</option>
    <option value="365">Last 365 days</option>
    <option value="custom">Custom range</option>
  </select>

  <div class="custom-range" id="customRange">
    <input type="date" id="startDate" />
    <span style="color:var(--muted);">to</span>
    <input type="date" id="endDate" />
  </div>

  <button onclick="loadData()">Refresh</button>
</div>

<div class="grid">
  <div class="card full">
    <h2>Add / update daily sessions</h2>
    <div class="sub" style="margin-bottom:12px;">
      Sessions now auto-sync daily from Microsoft Clarity. Use manual entry below only to
      backfill dates from before Clarity was installed, or if a sync was missed.
    </div>
    <div class="clarity-sync-row">
      <button onclick="syncClarityNow()" id="syncBtn">Sync from Clarity now</button>
      <span class="sub" id="clarityStatus"></span>
    </div>
    <hr style="border-color: var(--border); margin: 16px 0;" />
    <div id="sessionFormMsg"></div>
    <div class="session-form">
      <label>Date
        <input type="date" id="sf_date" />
      </label>
      <label>Total sessions
        <input type="number" id="sf_total" min="0" />
      </label>
      <label>Desktop
        <input type="number" id="sf_desktop" min="0" />
      </label>
      <label>Mobile
        <input type="number" id="sf_mobile" min="0" />
      </label>
      <button onclick="saveSession()">Save manually</button>
    </div>
  </div>
</div>

<div id="content">
  <div class="loading">Loading orders…</div>
</div>

<script>
let latestData = null;

function handleWindowChange() {
  const val = document.getElementById('daysSelect').value;
  const customRange = document.getElementById('customRange');
  if (val === 'custom') {
    customRange.classList.add('active');
    if (!document.getElementById('endDate').value) {
      const today = new Date();
      const start = new Date();
      start.setDate(today.getDate() - 30);
      document.getElementById('endDate').value = today.toISOString().slice(0, 10);
      document.getElementById('startDate').value = start.toISOString().slice(0, 10);
    }
  } else {
    customRange.classList.remove('active');
  }
}

function formatINR(amount) {
  return amount.toLocaleString('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 });
}

function buildQuery() {
  const windowVal = document.getElementById('daysSelect').value;
  if (windowVal === 'custom') {
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    if (!start || !end) {
      throw new Error('Please pick both a start and end date');
    }
    return `start_date=${start}&end_date=${end}`;
  }
  return `days=${windowVal}`;
}

async function loadData() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading orders…</div>';

  let query;
  try {
    query = buildQuery();
  } catch (err) {
    content.innerHTML = `<div class="error">${err.message}</div>`;
    return;
  }

  try {
    const res = await fetch(`/api/orders?${query}`);
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText);
    }
    const data = await res.json();
    latestData = data;
    render(data);
  } catch (err) {
    content.innerHTML = `<div class="error">Error loading orders: ${err.message}</div>`;
  }
}

async function saveSession() {
  const msgEl = document.getElementById('sessionFormMsg');
  msgEl.innerHTML = '';

  const date = document.getElementById('sf_date').value;
  const total = document.getElementById('sf_total').value;
  const desktop = document.getElementById('sf_desktop').value;
  const mobile = document.getElementById('sf_mobile').value;

  if (!date || total === '' || desktop === '' || mobile === '') {
    msgEl.innerHTML = `<div class="error">Fill in date, total, desktop and mobile before saving.</div>`;
    return;
  }

  try {
    const res = await fetch('/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        date,
        total_sessions: parseInt(total, 10),
        desktop_sessions: parseInt(desktop, 10),
        mobile_sessions: parseInt(mobile, 10),
      }),
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText);
    }
    msgEl.innerHTML = `<div class="success">Saved sessions for ${date}.</div>`;
    document.getElementById('sf_total').value = '';
    document.getElementById('sf_desktop').value = '';
    document.getElementById('sf_mobile').value = '';
    loadData();
  } catch (err) {
    msgEl.innerHTML = `<div class="error">Error saving: ${err.message}</div>`;
  }
}

async function syncClarityNow() {
  const btn = document.getElementById('syncBtn');
  const status = document.getElementById('clarityStatus');
  btn.disabled = true;
  status.textContent = 'Syncing…';

  try {
    const res = await fetch('/api/sessions/sync-clarity', { method: 'POST' });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText);
    }
    const data = await res.json();
    status.textContent = `Synced ${data.date}: ${data.data.total_sessions} sessions.`;
    loadData();
  } catch (err) {
    status.textContent = `Sync failed: ${err.message}`;
  } finally {
    btn.disabled = false;
  }
}

function prefillSessionForm(day) {
  document.getElementById('sf_date').value = day;
  document.getElementById('sf_total').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render(data) {
  document.getElementById('shopLabel').textContent =
    `${data.shop} — ${data.order_count} orders`;

  const channels = Object.keys(data.channel_totals).sort(
    (a, b) => data.channel_totals[b].orders - data.channel_totals[a].orders
  );

  const totalRevenue = channels.reduce((sum, c) => sum + data.channel_totals[c].revenue, 0);

  let rows = channels.map(c => {
    const t = data.channel_totals[c];
    const pct = data.order_count ? ((t.orders / data.order_count) * 100).toFixed(1) : 0;
    return `<tr>
      <td>${c}</td>
      <td>${t.orders}</td>
      <td>${pct}%</td>
      <td>${formatINR(t.revenue)}</td>
    </tr>`;
  }).join('');

  // Daily breakdown
  const dailyTotals = data.daily_totals || {};
  const days = Object.keys(dailyTotals).filter(d => d !== 'unknown').sort();

  // Totals for summary cards
  let totalSessions = 0, totalDesktop = 0, totalMobile = 0, daysWithSessions = 0;
  days.forEach(day => {
    const sm = dailyTotals[day].sessions;
    if (sm) {
      totalSessions += sm.total_sessions;
      totalDesktop += sm.desktop_sessions;
      totalMobile += sm.mobile_sessions;
      daysWithSessions++;
    }
  });
  const overallConvRate = totalSessions ? ((data.order_count / totalSessions) * 100).toFixed(2) : null;

  let dailyRows = days.map((day, idx) => {
    const d = dailyTotals[day];
    const dayChannels = Object.keys(d.channels).sort(
      (a, b) => d.channels[b].revenue - d.channels[a].revenue
    );
    const chips = dayChannels.map(c => {
      const isPaid = c.toLowerCase().includes('paid');
      const cls = isPaid ? 'badge-paid' : 'badge-organic';
      return `<span class="chip"><span class="${cls}">${c}</span>: ${d.channels[c].orders} orders, ${formatINR(d.channels[c].revenue)}</span>`;
    }).join('');

    const sm = d.sessions;
    let sessionsCell, deviceCell, convCell;
    if (sm) {
      const badgeClass = sm.source === 'clarity' ? 'source-clarity' : 'source-manual';
      const badgeLabel = sm.source === 'clarity' ? 'Clarity' : 'Manual';
      sessionsCell = `${sm.total_sessions}<span class="source-badge ${badgeClass}">${badgeLabel}</span>`;
      const dPct = sm.total_sessions ? Math.round((sm.desktop_sessions / sm.total_sessions) * 100) : 0;
      const mPct = sm.total_sessions ? Math.round((sm.mobile_sessions / sm.total_sessions) * 100) : 0;
      deviceCell = `
        <div style="display:flex; align-items:center; gap:8px;">
          <div class="device-bar">
            <div class="desktop" style="width:${dPct}%"></div>
            <div class="mobile" style="width:${mPct}%"></div>
          </div>
          <span style="font-size:12px; color:var(--muted);">${sm.desktop_sessions} / ${sm.mobile_sessions}</span>
        </div>`;
      convCell = d.conversion_rate !== null ? `${d.conversion_rate}%` : '—';
    } else {
      sessionsCell = `<span class="missing" onclick="prefillSessionForm('${day}')" style="cursor:pointer;">+ add</span>`;
      deviceCell = '<span class="missing">—</span>';
      convCell = '<span class="missing">—</span>';
    }

    return `
      <tr class="day-row" onclick="toggleDay(${idx})">
        <td>${day}</td>
        <td onclick="event.stopPropagation()">${sessionsCell}</td>
        <td onclick="event.stopPropagation()">${deviceCell}</td>
        <td onclick="event.stopPropagation()">${convCell}</td>
        <td>${d.orders}</td>
        <td>${formatINR(d.revenue)}</td>
        <td>${dayChannels.length} channel${dayChannels.length !== 1 ? 's' : ''}</td>
      </tr>
      <tr class="day-detail" id="day-detail-${idx}">
        <td colspan="7">
          <div class="day-detail-inner">${chips}</div>
        </td>
      </tr>`;
  }).join('');

  if (!dailyRows) {
    dailyRows = `<tr><td colspan="7" style="color:var(--muted);">No orders in this range</td></tr>`;
  }

  document.getElementById('content').innerHTML = `
    <div class="grid">
      <div class="card">
        <h2>Total Orders</h2>
        <div class="stat">${data.order_count}</div>
      </div>
      <div class="card">
        <h2>Total Revenue</h2>
        <div class="stat">${formatINR(totalRevenue)}</div>
      </div>
    </div>
    <div class="grid">
      <div class="card">
        <h2>Total Sessions <span style="font-weight:400;">(${daysWithSessions}/${days.length} days entered)</span></h2>
        <div class="stat">${totalSessions || '—'}</div>
        <div class="sub" style="margin-top:6px;">Desktop ${totalDesktop} · Mobile ${totalMobile}</div>
      </div>
      <div class="card">
        <h2>Conversion Rate</h2>
        <div class="stat">${overallConvRate !== null ? overallConvRate + '%' : '—'}</div>
        <div class="sub" style="margin-top:6px;">Orders ÷ sessions, across days with data entered</div>
      </div>
    </div>
    <div class="grid">
      <div class="card">
        <h2>Orders by Channel</h2>
        <canvas id="channelChart" height="220"></canvas>
      </div>
      <div class="card">
        <h2>Breakdown</h2>
        <table>
          <thead><tr><th>Channel</th><th>Orders</th><th>%</th><th>Revenue</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
    <div class="grid">
      <div class="card full">
        <h2>Daily Revenue by Channel</h2>
        <canvas id="dailyChart" height="100"></canvas>
      </div>
    </div>
    <div class="grid">
      <div class="card full">
        <h2>Day-wise Sessions / Orders (click a row for channel split)</h2>
        <div class="scroll-table">
          <table>
            <thead><tr>
              <th>Date</th><th>Sessions</th><th>Desktop / Mobile</th><th>Conv. Rate</th>
              <th>Orders</th><th>Revenue</th><th>Channels</th>
            </tr></thead>
            <tbody>${dailyRows}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  const ctx = document.getElementById('channelChart');
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: channels,
      datasets: [{
        data: channels.map(c => data.channel_totals[c].orders),
        backgroundColor: ['#5b8def','#f59e0b','#10b981','#ef4444','#a78bfa','#f472b6','#22d3ee','#84cc16'],
        borderWidth: 0,
      }]
    },
    options: {
      plugins: { legend: { position: 'bottom', labels: { color: '#e8eaed' } } }
    }
  });

  if (days.length) {
    const paidDaily = days.map(day => {
      const d = dailyTotals[day];
      return Object.keys(d.channels)
        .filter(c => c.toLowerCase().includes('paid'))
        .reduce((sum, c) => sum + d.channels[c].revenue, 0);
    });
    const organicDaily = days.map(day => {
      const d = dailyTotals[day];
      return Object.keys(d.channels)
        .filter(c => !c.toLowerCase().includes('paid'))
        .reduce((sum, c) => sum + d.channels[c].revenue, 0);
    });

    const dctx = document.getElementById('dailyChart');
    new Chart(dctx, {
      type: 'bar',
      data: {
        labels: days,
        datasets: [
          { label: 'Paid', data: paidDaily, backgroundColor: '#f59e0b' },
          { label: 'Organic / Other', data: organicDaily, backgroundColor: '#10b981' },
        ]
      },
      options: {
        scales: {
          x: { stacked: true, ticks: { color: '#9aa2af' }, grid: { color: '#262b36' } },
          y: { stacked: true, ticks: { color: '#9aa2af' }, grid: { color: '#262b36' } },
        },
        plugins: { legend: { position: 'bottom', labels: { color: '#e8eaed' } } }
      }
    });
  }
}

function toggleDay(idx) {
  const row = document.getElementById(`day-detail-${idx}`);
  row.classList.toggle('open');
}

loadData();
</script>
</body>
</html>
